name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  # Validate the installer script and packaging generator on every change so
  # release automation can't silently rot.
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Shellcheck install + packaging scripts
        run: shellcheck install.sh scripts/*.sh

      - name: Smoke-test packaging generator
        run: |
          mkdir -p /tmp/cksums
          for t in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            printf '%s  bsv-%s.tar.gz\n' "$(printf '%064d' 0)" "$t" \
              > "/tmp/cksums/bsv-$t.tar.gz.sha256"
          done
          printf '%s  bsv-x86_64-pc-windows-msvc.zip\n' "$(printf '%064d' 0)" \
            > /tmp/cksums/bsv-x86_64-pc-windows-msvc.zip.sha256
          scripts/update-packaging.sh 9.9.9 /tmp/cksums
          grep -q 'version "9.9.9"' Formula/bsv.rb
          python3 -m json.tool bucket/bsv.json > /dev/null
          # Restore the working tree so the smoke test leaves no diff.
          git checkout -- Formula/bsv.rb bucket/bsv.json
