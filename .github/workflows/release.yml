name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build a release binary per platform and package it as an archive plus a
  # SHA-256 checksum file that the publish job feeds into the package manifests.
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin="bsv"
          [ "${{ matrix.os }}" = "windows-latest" ] && bin="bsv.exe"

          staging="bsv-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/$bin" "$staging/"
          cp README.md LICENSE "$staging/" 2>/dev/null || true

          asset="bsv-${{ matrix.target }}.${{ matrix.ext }}"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            7z a "$asset" "./$staging/*" >/dev/null
          else
            tar -C "$staging" -czf "$asset" .
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
          echo "Built $asset"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsv-${{ matrix.target }}
          path: |
            bsv-${{ matrix.target }}.${{ matrix.ext }}
            bsv-${{ matrix.target }}.${{ matrix.ext }}.sha256

  # Publish the GitHub Release and refresh the in-repo Homebrew formula and Scoop
  # manifest with the new version and checksums.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Update packaging manifests
        run: |
          version="${GITHUB_REF_NAME#v}"
          scripts/update-packaging.sh "$version" artifacts

      - name: Commit updated manifests to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/bsv.rb bucket/bsv.json; then
            echo "No packaging changes to commit."
          else
            git add Formula/bsv.rb bucket/bsv.json
            git commit -m "chore(release): update packaging manifests for ${GITHUB_REF_NAME}"
            git push origin main
          fi
